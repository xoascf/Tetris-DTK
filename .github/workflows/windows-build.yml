name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout Tetris-DTK
        uses: actions/checkout@v7
        with:
          path: Tetris-DTK

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-make
            mingw-w64-x86_64-pkg-config
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-spdlog
            mingw-w64-x86_64-icu
            mingw-w64-x86_64-uchardet
            mingw-w64-x86_64-libiconv
            mingw-w64-x86_64-librsvg
            git

      # DTK Common
      - name: Checkout dtkcommon
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkcommon
          path: dtkcommon

      - name: Build dtkcommon
        working-directory: dtkcommon
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="/mingw64" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF
          cmake --build .
          cmake --install .

      # DTK Log (with PR 48)
      - name: Checkout dtklog
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtklog
          path: dtklog
          fetch-depth: 0

      - name: Apply PR 48 to dtklog
        working-directory: dtklog
        run: |
          git fetch origin pull/48/head:pr48
          git checkout -f pr48

      - name: Build dtklog
        working-directory: dtklog
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="/mingw64" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # DTK Core (PR 573 merged commit)
      - name: Checkout dtkcore
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkcore
          path: dtkcore
          ref: 14054a81d42fd9a7952936b23f453edbefdc042b

      - name: Build dtkcore
        working-directory: dtkcore
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="/mingw64" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # DTK Gui (with PR 400)
      - name: Checkout dtkgui
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkgui
          path: dtkgui
          fetch-depth: 0

      - name: Apply PR 400 to dtkgui
        working-directory: dtkgui
        run: |
          git fetch origin pull/400/head:pr400
          git checkout -f pr400

      - name: Build dtkgui
        working-directory: dtkgui
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="/mingw64" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # DTK Widget (with PR 757)
      - name: Checkout dtkwidget
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkwidget
          path: dtkwidget
          fetch-depth: 0

      - name: Apply PR 757 to dtkwidget
        working-directory: dtkwidget
        run: |
          git fetch origin pull/757/head:pr757
          git checkout -f pr757

      - name: Build dtkwidget
        working-directory: dtkwidget
        run: |
          mkdir build && cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="/mingw64" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # Build Tetris-DTK
      - name: Build Tetris-DTK
        working-directory: Tetris-DTK
        run: |
          mkdir build-win && cd build-win
          lrelease ../Tetris.pro
          qmake6 ../Tetris.pro "PREFIX=/mingw64"
          mingw32-make

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tetris-deepin-windows
          path: Tetris-DTK/build-win/release/tetris-deepin.exe
