name: Build Windows App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Tetris-DTK
        uses: actions/checkout@v7
        with:
          path: Tetris-DTK

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.8.*'
          arch: 'win64_msvc2022_64'
          cache: 'true'

      - name: Install Ninja & CMake
        run: |
          choco install ninja cmake pkgconfiglite -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      # DTK Common
      - name: Checkout dtkcommon
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkcommon
          path: dtkcommon

      - name: Build dtkcommon
        working-directory: dtkcommon
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/dtk" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF
          cmake --build .
          cmake --install .

      # spdlog
      - name: Install spdlog
        run: |
          git clone --depth 1 -b v1.17.0 https://github.com/gabime/spdlog.git
          cd spdlog
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/dtk" -DSPDLOG_BUILD_TESTS=OFF -DSPDLOG_BUILD_EXAMPLE=OFF
          cmake --build .
          cmake --install .

      # DTK Log (with PR 48)
      - name: Checkout dtklog
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtklog
          path: dtklog
          fetch-depth: 0

      - name: Apply PR 48 to dtklog
        working-directory: dtklog
        run: |
          git fetch origin pull/48/head:pr48
          git checkout pr48
          $content = Get-Content src/ConsoleAppender.cpp -Raw
          $content = $content -replace '#include <unistd\.h>', "#ifdef _WIN32`n#include <io.h>`n#include <stdio.h>`n#define isatty _isatty`n#define STDOUT_FILENO _fileno(stdout)`n#else`n#include <unistd.h>`n#endif"
          Set-Content src/ConsoleAppender.cpp -Value $content

      - name: Build dtklog
        working-directory: dtklog
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/dtk" -DCMAKE_PREFIX_PATH="C:/dtk" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # DTK Core (PR 573 merged commit)
      - name: Checkout dtkcore
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkcore
          path: dtkcore
          ref: 14054a81d42fd9a7952936b23f453edbefdc042b

      - name: Patch dtkcore for MSVC (mock dynamic text encoding headers)
        working-directory: dtkcore
        run: |
          $cpp = Get-Content src/util/dtextencoding.cpp -Raw
          $cpp = $cpp -replace '#include <unicode/ucsdet\.h>', "typedef struct UCharsetDetector UCharsetDetector; typedef struct UCharsetMatch UCharsetMatch; typedef int UErrorCode;"
          $cpp = $cpp -replace '#include <uchardet/uchardet\.h>', "typedef struct uchardet *uchardet_t;"
          $cpp = $cpp -replace '#include <iconv\.h>', "typedef void* iconv_t;"
          Set-Content src/util/dtextencoding.cpp -Value $cpp
          $cmake = Get-Content src/CMakeLists.txt -Raw
          $cmake = $cmake -replace 'find_package\(ICU REQUIRED COMPONENTS uc\)', ''
          $cmake = $cmake -replace 'pkg_check_modules\(uchardet REQUIRED uchardet\)', ''
          $cmake = $cmake -replace 'find_package\(Qt6 REQUIRED COMPONENTS CorePrivate\)', ''
          Set-Content src/CMakeLists.txt -Value $cmake
          $dci_h = Get-Content src/dci/private/ddcifileengine_p.h -Raw
          $dci_h = $dci_h -replace 'QT_VERSION_CHECK\(6, 9, 0\)', 'QT_VERSION_CHECK(6, 8, 1)'
          Set-Content src/dci/private/ddcifileengine_p.h -Value $dci_h
          $dci_cpp = Get-Content src/dci/private/ddcifileengine.cpp -Raw
          $dci_cpp = $dci_cpp -replace 'QT_VERSION_CHECK\(6, 9, 0\)', 'QT_VERSION_CHECK(6, 8, 1)'
          Set-Content src/dci/private/ddcifileengine.cpp -Value $dci_cpp

      - name: Build dtkcore
        working-directory: dtkcore
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/dtk" -DCMAKE_PREFIX_PATH="C:/dtk" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # DTK Gui (with PR 400)
      - name: Checkout dtkgui
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkgui
          path: dtkgui
          fetch-depth: 0

      - name: Apply PR 400 to dtkgui
        working-directory: dtkgui
        run: |
          git fetch origin pull/400/head:pr400
          git checkout pr400

      - name: Build dtkgui
        working-directory: dtkgui
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/dtk" -DCMAKE_PREFIX_PATH="C:/dtk" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF -DDTK5=OFF
          cmake --build .
          cmake --install .

      # DTK Widget (with PR 757)
      - name: Checkout dtkwidget
        uses: actions/checkout@v7
        with:
          repository: linuxdeepin/dtkwidget
          path: dtkwidget
          fetch-depth: 0

      - name: Apply PR 757 to dtkwidget
        working-directory: dtkwidget
        run: |
          git fetch origin pull/757/head:pr757
          git checkout pr757

      - name: Build dtkwidget
        working-directory: dtkwidget
        run: |
          mkdir build
          cd build
          cmake .. -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="C:/dtk" -DCMAKE_PREFIX_PATH="C:/dtk" -DBUILD_DOCS=OFF -DBUILD_TESTING=OFF -DBUILD_EXAMPLES=OFF
          cmake --build .
          cmake --install .

      # Build Tetris-DTK
      - name: Build Tetris-DTK
        working-directory: Tetris-DTK
        run: |
          mkdir build-win
          cd build-win
          qmake ../Tetris.pro "PREFIX=C:/dtk"
          nmake

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: tetris-deepin-windows
          path: Tetris-DTK/build-win/release/tetris-deepin.exe
